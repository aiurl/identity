spring:
    application:
        name: identity
    datasource:
        url: jdbc:h2:mem:identity;MODE=MYSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
        username: sa
        password:
        driver-class-name: org.h2.Driver
    jpa:
        hibernate:
            ddl-auto: none
    sql:
        init:
            mode: always

security:
    jwt:
        secret: this-is-a-demo-jwt-secret-key-for-linkyou-identity-service-2026
        expiration-minutes: 120
